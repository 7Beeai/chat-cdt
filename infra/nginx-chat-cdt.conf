# CHAT-CDT — bloco nginx para chat.cdt.7bee.ai
#
# INSTALAÇÃO:
#   sudo cp infra/nginx-chat-cdt.conf /etc/nginx/sites-available/chat-cdt
#   sudo ln -sf /etc/nginx/sites-available/chat-cdt /etc/nginx/sites-enabled/chat-cdt
#   sudo nginx -t                # valida sintaxe
#   sudo systemctl reload nginx
#
# DEPOIS, emitir o cert TLS (Let's Encrypt via certbot):
#   sudo certbot --nginx -d chat.cdt.7bee.ai
#   (o certbot reescreve este arquivo adicionando o bloco TLS — é esperado)

server {
    listen 80;
    listen [::]:80;
    server_name chat.cdt.7bee.ai;

    # Antes do certbot rodar pela primeira vez, isso serve HTTP.
    # Depois do certbot, ele adiciona redirect 301 → 443 automaticamente.

    # Body grande pra suportar upload (PNG icons, áudios futuros via WhatsApp media)
    client_max_body_size 25m;

    # gzip
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Logs
    access_log /var/log/nginx/chat-cdt-access.log;
    error_log  /var/log/nginx/chat-cdt-error.log;

    # Service worker — NUNCA cachear (atualização imediata)
    location = /sw.js {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    # Static assets do Next + PWA — cache longo, imutável
    location ~* ^/(_next/static/|icon-.*\.png$|badge\.png$|icon\.svg$|manifest\.webmanifest$) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Tudo o mais → Next
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers para o Next saber o host real + protocolo
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket / SSE (Supabase Realtime pode usar)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Webhooks da Meta podem demorar; timeouts generosos
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
